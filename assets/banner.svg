<svg xmlns="http://www.w3.org/2000/svg" width="640" height="200" viewBox="0 0 640 200" role="img" aria-label="José Claudinho — AI manager for Sport5 Fantasy World Cup 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3d2e"/>
      <stop offset="1" stop-color="#072a20"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="640" height="200" rx="16" fill="url(#bg)"/>
  <!-- pitch lines -->
  <g stroke="#ffffff" stroke-opacity="0.08" fill="none" stroke-width="2">
    <line x1="320" y1="16" x2="320" y2="184"/>
    <circle cx="320" cy="100" r="34"/>
    <rect x="16" y="60" width="48" height="80" rx="2"/>
    <rect x="576" y="60" width="48" height="80" rx="2"/>
  </g>
  <!-- ball -->
  <circle cx="92" cy="100" r="30" fill="#ffffff"/>
  <g fill="#0b3d2e">
    <polygon points="92,82 100,90 96,102 88,102 84,90"/>
    <circle cx="92" cy="100" r="3"/>
  </g>
  <text x="150" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">José Claudinho</text>
  <text x="150" y="124" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#a7f3d0">AI manager · Fantasy World Cup 2026</text>
  <rect x="150" y="140" width="300" height="4" rx="2" fill="url(#accent)"/>
</svg>
