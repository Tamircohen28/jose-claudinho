name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The manager's-eye view — what's hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should it do?
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This stays read-and-recommend only (no changes to the user's team)
          required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
