name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please don't paste your `SPORT5_COOKIE` or any session
        credential anywhere in this issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I ran /squad-advice qf and…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - MCP tool (sport5_* / worldcup_fixtures / analyze_ownership)
        - Skill / slash command (/squad-advice, /snapshot-league, /fantasy-setup, ...)
        - Build / install
        - Other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Node version, OS, Claude Code version.
      placeholder: |
        node -v:
        OS:
        Claude Code:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any error message. Redact cookies and tokens.
      render: shell
